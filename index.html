      'Q': 'M 0.5 0 L 0.69 0.04 L 0.85 0.15 L 0.96 0.31 L 1 0.5 L 0.96 0.69 L 0.85 0.85 L 0.69 0.96 L 0.5 1 L 0.31 0.96 L 0.15 0.85 L 0.04 0.69 L 0 0.5 L 0.04 0.31 L 0.15 0.15 L 0.31 0.04 Z M 0.6 0.6 L 1 1',
      'R': 'M 0 1 L 0 0 L 0.5 0 L 0.72 0.03 L 0.89 0.11 L 1 0.25 L 0.89 0.39 L 0.72 0.47 L 0.5 0.5 L 0 0.5 M 0.5 0.5 L 1 1',
      'S': 'M 0.9 0.2 L 0.75 0.05 L 0.5 0 L 0.25 0.05 L 0.1 0.2 L 0.1 0.35 L 0.25 0.45 L 0.75 0.55 L 0.9 0.65 L 0.9 0.8 L 0.75 0.95 L 0.5 1 L 0.25 0.95 L 0.1 0.8',

      '3': 'M 0.1 0.15 L 0.25 0.03 L 0.5 0 L 0.75 0.03 L 0.9 0.15 L 0.9 0.35 L 0.75 0.47 L 0.5 0.5 L 0.75 0.53 L 0.9 0.65 L 0.9 0.85 L 0.75 0.97 L 0.5 1 L 0.25 0.97 L 0.1 0.85',
      '4': 'M 0.7 1 L 0.7 0 L 0 0.7 L 1 0.7',

      ',': 'M 0.5 0.7 L 0.5 0.9 L 0.4 1',
      ' ': ''
    };

    // --- CHARACTER PROPORTIONAL WIDTH CALCULATOR (Drafting Kerning Logic) ---
    const getCharWidth = (char, baseWidth) => {
      const u = char.toUpperCase();
      if (u === '1' || u === 'I') {
        return Math.max(1.2, baseWidth * 0.2); 
      }
      if (u === '.' || u === ':' || u === ',') {
        return Math.max(1.2, baseWidth * 0.2);
      }
      if (u === '/') {
        return baseWidth * 0.5;
      }
      if (u === '-') {
        return baseWidth * 0.5;
      }
      if (u === ' ') {
        return baseWidth * 0.6;
      }
      return baseWidth;
    };

    const getCharPositions = (text, baseWidth, gap) => {
      const positions = [];
      let currentX = 0;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const charW = getCharWidth(char, baseWidth);
        positions.push({
          char,
          x: currentX,
          width: charW
        });
        currentX += charW + gap;
      }
      const totalWidth = text.length > 0 ? currentX - gap : 0;
      return { positions, totalWidth };
    };

    const DEFAULTS = {
      title: "ENTER EXPERIMENT TITLE\nLINE TWO OF TITLE\nLINE THREE OF TITLE",
      studentName: "STUDENT NAME XXXX",
      registerNo: "E/XX/XXX",
      groupNo: "GROUP XXX",
      semesterNo: "SEMESTER X",
      date: "DD/MM/YYYY",
      
      titleCharWidth: 8,
      titleCharHeight: 10,
      titleCharGap: 1,
      titleLineGap: 6,
      titleTopY: 55,

      nameCharWidth: 4,
      nameCharHeight: 5,
      nameCharGap: 1,

      otherCharWidth: 3,
      otherCharHeight: 4,
      otherCharGap: 1,

      verticalGap: 3,
      dateBottomGap: 15,
      rightMarginGap: 10,

      leftMargin: 15,
      rightMargin: 12,
      topMargin: 12,
      bottomMargin: 12,

      showBorderLine: true
    };

    const PRESETS = {
      default: {
        title: "ENTER EXPERIMENT TITLE\nLINE TWO OF TITLE\nLINE THREE OF TITLE",
        studentName: "STUDENT NAME XXXX",
        registerNo: "E/XX/XXX",
        groupNo: "GROUP XXX",
        semesterNo: "SEMESTER X",
        date: "DD/MM/YYYY",
        
        titleCharWidth: 8,
        titleCharHeight: 10,
        titleCharGap: 1,
        titleLineGap: 6,
        titleTopY: 55,

        nameCharWidth: 4,
        nameCharHeight: 5,
        nameCharGap: 1,

        otherCharWidth: 3,
        otherCharHeight: 4,
        otherCharGap: 1,

        verticalGap: 3,
        dateBottomGap: 15,
        rightMarginGap: 10,

        leftMargin: 15,
        rightMargin: 12,
        topMargin: 12,
        bottomMargin: 12,

        showBorderLine: true
      },
      casting: {
        title: "ALTERNATIVE LAB TITLE\nMICROSCOPICAL STUDY\nOF STRUCTURAL METALS",
        studentName: "STUDENT NAME XXXX",
        registerNo: "E/XX/XXX",
        groupNo: "GROUP XXX",
        semesterNo: "SEMESTER X",
        date: "DD/MM/YYYY",
        
        titleCharWidth: 8,
        titleCharHeight: 10,
        titleCharGap: 1,
        titleLineGap: 6,
        titleTopY: 55,

        nameCharWidth: 4,
        nameCharHeight: 5,
        nameCharGap: 1,

        otherCharWidth: 3,
        otherCharHeight: 4,
        otherCharGap: 1,

        verticalGap: 3,
        dateBottomGap: 15,
        rightMarginGap: 10,

        leftMargin: 15,
        rightMargin: 12,
        topMargin: 12,
        bottomMargin: 12,

        showBorderLine: true
      }
    };

    function App() {
      const [title, setTitle] = useState(DEFAULTS.title);
      const [studentName, setStudentName] = useState(DEFAULTS.studentName);
      const [registerNo, setRegisterNo] = useState(DEFAULTS.registerNo);
      const [groupNo, setGroupNo] = useState(DEFAULTS.groupNo);
      const [semesterNo, setSemesterNo] = useState(DEFAULTS.semesterNo);
      const [date, setDate] = useState(DEFAULTS.date);

      const [titleCharWidth, setTitleCharWidth] = useState(DEFAULTS.titleCharWidth);
      const [titleCharHeight, setTitleCharHeight] = useState(DEFAULTS.titleCharHeight);
      const [titleCharGap, setTitleCharGap] = useState(DEFAULTS.titleCharGap);
      const [titleLineGap, setTitleLineGap] = useState(DEFAULTS.titleLineGap);
      const [titleTopY, setTitleTopY] = useState(DEFAULTS.titleTopY);
      const [autoCenterVertical, setAutoCenterVertical] = useState(true);

      const [nameCharWidth, setNameCharWidth] = useState(DEFAULTS.nameCharWidth);
      const [nameCharHeight, setNameCharHeight] = useState(DEFAULTS.nameCharHeight);
      const [nameCharGap, setNameCharGap] = useState(DEFAULTS.nameCharGap);

      const [otherCharWidth, setOtherCharWidth] = useState(DEFAULTS.otherCharWidth);
      const [otherCharHeight, setOtherCharHeight] = useState(DEFAULTS.otherCharHeight);
      const [otherCharGap, setOtherCharGap] = useState(DEFAULTS.otherCharGap);

      const [verticalGap, setVerticalGap] = useState(DEFAULTS.verticalGap);
      const [dateBottomGap, setDateBottomGap] = useState(DEFAULTS.dateBottomGap);
      const [rightMarginGap, setRightMarginGap] = useState(DEFAULTS.rightMarginGap);

      const [leftMargin, setLeftMargin] = useState(DEFAULTS.leftMargin);
      const [rightMargin, setRightMargin] = useState(DEFAULTS.rightMargin);
      const [topMargin, setTopMargin] = useState(DEFAULTS.topMargin);
      const [bottomMargin, setBottomMargin] = useState(DEFAULTS.bottomMargin);

      const [showGrid, setShowGrid] = useState(true);
      const [showRulers, setShowRulers] = useState(true);
      const [showGuidelines, setShowGuidelines] = useState(true);
      const [showBorderLine, setShowBorderLine] = useState(true);
      const [fontStyle, setFontStyle] = useState("cad");
      const [zoom, setZoom] = useState(0.8);
      const [activeField, setActiveField] = useState(null);

      const [activePreset, setActivePreset] = useState("default");

      useEffect(() => {
        try {
          const profile = localStorage.getItem('university_student_profile');
          if (profile) {
            const data = JSON.parse(profile);
            setStudentName(data.name || DEFAULTS.studentName);
            setRegisterNo(data.registerNo || DEFAULTS.registerNo);
            setGroupNo(data.groupNo || DEFAULTS.groupNo);
            setSemesterNo(data.semesterNo || DEFAULTS.semesterNo);
          }
        } catch (e) {
          console.error(e);
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('title')) {
          setTitle(urlParams.get('title'));
          if (urlParams.has('date')) setDate(urlParams.get('date'));
        }
      }, []);

      const handleSaveProfile = () => {
        try {
          const data = { name: studentName, registerNo, groupNo, semesterNo };
          localStorage.setItem('university_student_profile', JSON.stringify(data));
          alert("Profile credentials saved successfully!");
        } catch (e) {
          alert("Failed to save profile.");
        }
      };

      const handleCopyShareLink = () => {
        const url = new URL(window.location.origin + window.location.pathname);
        url.searchParams.set('title', title);
        url.searchParams.set('date', date);
        navigator.clipboard.writeText(url.toString());
        alert("Shareable template link copied!");
      };

      const calculateTextWidth = (text, charWidth, gap) => {
        return getCharPositions(text, charWidth, gap).totalWidth;
      };

      const paperWidth = 210;
      const paperHeight = 297;

      const boundLeft = leftMargin;
      const boundRight = paperWidth - rightMargin;
      const boundTop = topMargin;
      const boundBottom = paperHeight - bottomMargin;
      const centerOfBounds = boundLeft + (boundRight - boundLeft) / 2;

      const alignedRightTarget = boundRight - rightMarginGap;

      const dateUnderlineY = boundBottom - dateBottomGap;
      const dateTextBottomY = dateUnderlineY - 1;
      const dateTextTopY = dateTextBottomY - otherCharHeight;

      const semesterUnderlineY = dateTextTopY - verticalGap;
      const semesterTextBottomY = semesterUnderlineY - 1;
      const semesterTextTopY = semesterTextBottomY - otherCharHeight;

      const groupUnderlineY = semesterTextTopY - verticalGap;
      const groupTextBottomY = groupUnderlineY - 1;
      const groupTextTopY = groupTextBottomY - otherCharHeight;

      const registerUnderlineY = groupTextTopY - verticalGap;
      const registerTextBottomY = registerUnderlineY - 1;
      const registerTextTopY = registerTextBottomY - otherCharHeight;

      const nameUnderlineY = registerTextTopY - verticalGap;
      const nameTextBottomY = nameUnderlineY - 1;
      const nameTextTopY = nameTextBottomY - nameCharHeight;

      const nameW = calculateTextWidth(studentName, nameCharWidth, nameCharGap);
      const nameX = alignedRightTarget - nameW;
      const detailsLeftX = nameX;

      const regW = calculateTextWidth(registerNo, otherCharWidth, otherCharGap);
      const grpW = calculateTextWidth(groupNo, otherCharWidth, otherCharGap);
      const semW = calculateTextWidth(semesterNo, otherCharWidth, otherCharGap);
      const dateW = calculateTextWidth(date, otherCharWidth, otherCharGap);

      const titleLines = title.split('\n');
      const titleBlockHeight = titleLines.length * titleCharHeight + (titleLines.length - 1) * titleLineGap;
      const currentTitleTopY = autoCenterVertical 
        ? boundTop + (nameTextTopY - boundTop - titleBlockHeight) / 2 
        : titleTopY;

      // --- VECTOR TEXT RENDERING ENGINES ---
      const renderCadLetter = (char, x, y, w, h, key) => {
        const path = CAD_FONT[char.toUpperCase()];
        if (!path) return <g key={key}></g>;
        return (
          <path
            key={key}
            d={path}
            transform={`translate(${x}, ${y}) scale(${w}, ${h})`}
            fill="none"
            stroke="black"
            strokeWidth="0.4"
            strokeLinecap="round"
            strokeLinejoin="round"
            vectorEffect="non-scaling-stroke"
          />
        );
      };

      const renderLineText = (text, startX, bottomY, charW, charH, gap) => {
        const { positions } = getCharPositions(text, charW, gap);
        const charY = bottomY - charH;
        return (
          <g>
            {positions.map((item, index) => {
              const charX = startX + item.x;
              if (fontStyle === "cad") {
                return renderCadLetter(item.char, charX, charY, item.width, charH, index);
              } else {
                return (
                  <text
                    key={index}
                    x={charX + item.width / 2}
                    y={bottomY}
                    fontFamily="JetBrains Mono, monospace"
                    fontSize={charH * 1.25}
                    fontWeight="600"
                    textAnchor="middle"
                    fill="black"
                  >
                    {item.char}
                  </text>
                );
              }
            })}
          </g>
        );
      };

      const loadPreset = (presetKey) => {
        const p = PRESETS[presetKey];
        if (!p) return;
        setTitle(p.title);
        setStudentName(p.studentName);
        setRegisterNo(p.registerNo);
        setGroupNo(p.groupNo);
        setSemesterNo(p.semesterNo);
        setDate(p.date);
        setTitleCharWidth(p.titleCharWidth);
        setTitleCharHeight(p.titleCharHeight);
        setTitleCharGap(p.titleCharGap);
        setTitleLineGap(p.titleLineGap);
        setTitleTopY(p.titleTopY);
        setNameCharWidth(p.nameCharWidth);
        setNameCharHeight(p.nameCharHeight);
        setNameCharGap(p.nameCharGap);
        setOtherCharWidth(p.otherCharWidth);
        setOtherCharHeight(p.otherCharHeight);
        setOtherCharGap(p.otherCharGap);
        setVerticalGap(p.verticalGap);
        setDateBottomGap(p.dateBottomGap);
        setRightMarginGap(p.rightMarginGap);
        setLeftMargin(p.leftMargin);
        setRightMargin(p.rightMargin);
        setTopMargin(p.topMargin);
        setBottomMargin(p.bottomMargin);
        setShowBorderLine(p.showBorderLine);
        setActivePreset(presetKey);
      };

      const compliance = {
        leftMargin: leftMargin === 15,
        otherMargins: rightMargin === 12 && topMargin === 12 && bottomMargin === 12,
        titleChar: titleCharWidth === 8 && titleCharHeight === 10 && titleCharGap === 1,
        nameChar: nameCharWidth === 4 && nameCharHeight === 5 && nameCharGap === 1,
        nameRightGap: rightMarginGap === 10,
        otherChar: otherCharWidth === 3 && otherCharHeight === 4 && otherCharGap === 1,
        verticalGap: verticalGap === 3,
        dateBottomGap: dateBottomGap === 15,
        underlineGap: true
      };

      const allCompliant = Object.values(compliance).every(Boolean);

      const handleDownloadPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        doc.setDrawColor(0, 0, 0);
        doc.setLineWidth(0.4);

        if (showBorderLine) {
          doc.rect(boundLeft, boundTop, boundRight - boundLeft, boundBottom - boundTop);
        }

        const drawStrokeText = (text, startX, bY, charW, charH, gap) => {
          const charY = bY - charH;
          const { positions } = getCharPositions(text, charW, gap);
          for (let cIdx = 0; cIdx < positions.length; cIdx++) {
            const item = positions[cIdx];
            const char = item.char.toUpperCase();
            const charX = startX + item.x;
            const path = CAD_FONT[char];
            if (!path) continue;
            const tokens = path.trim().split(/\s+/);
            let i = 0; let startXSub = 0, startYSub = 0; let hasPoint = false;
            while (i < tokens.length) {
              const cmd = tokens[i];
              if (cmd === 'M') {
                const px = charX + parseFloat(tokens[i+1]) * item.width;
                const py = charY + parseFloat(tokens[i+2]) * charH;
                doc.moveTo(px, py); startXSub = px; startYSub = py; hasPoint = true; i += 3;
              } else if (cmd === 'L') {
                const px = charX + parseFloat(tokens[i+1]) * item.width;
                const py = charY + parseFloat(tokens[i+2]) * charH;
                if (hasPoint) { doc.lineTo(px, py); } else { doc.moveTo(px, py); startXSub = px; startYSub = py; hasPoint = true; }
                i += 3;
              } else if (cmd === 'Z') {
                if (hasPoint) { doc.lineTo(startXSub, startYSub); } i += 1;
              } else { i++; }
            }
          }
          doc.stroke();
        };

        const drawStandardText = (text, startX, bY, charW, charH, gap) => {
          doc.setFont('courier', 'bold');
          doc.setFontSize(charH * 2.83465 * 1.25);
          const { positions } = getCharPositions(text, charW, gap);
          for (let i = 0; i < positions.length; i++) {
            const item = positions[i];
            const charX = startX + item.x;
            doc.text(item.char, charX + (item.width / 6), bY - (charH * 0.1));
          }
        };

        const drawTextSelection = (text, sX, bY, cW, cH, gap) => {
          if (fontStyle === "cad") { drawStrokeText(text, sX, bY, cW, cH, gap); } 
          else { drawStandardText(text, sX, bY, cW, cH, gap); }
        };

        titleLines.forEach((line, index) => {
          const tW = calculateTextWidth(line, titleCharWidth, titleCharGap);
          const tX = centerOfBounds - tW / 2;
          const tBottomY = currentTitleTopY + index * (titleCharHeight + titleLineGap) + titleCharHeight;
          drawTextSelection(line, tX, tBottomY, titleCharWidth, titleCharHeight, titleCharGap);
          const ulY = tBottomY + 1;
          doc.line(tX, ulY, tX + tW, ulY);
        });

        drawTextSelection(studentName, nameX, nameTextBottomY, nameCharWidth, nameCharHeight, nameCharGap);
        doc.line(nameX, nameUnderlineY, nameX + nameW, nameUnderlineY);

        drawTextSelection(registerNo, detailsLeftX, registerTextBottomY, otherCharWidth, otherCharHeight, otherCharGap);
        doc.line(detailsLeftX, registerUnderlineY, detailsLeftX + regW, registerUnderlineY);

        drawTextSelection(groupNo, detailsLeftX, groupTextBottomY, otherCharWidth, otherCharHeight, otherCharGap);

        drawTextSelection(semesterNo, detailsLeftX, semesterTextBottomY, otherCharWidth, otherCharHeight, otherCharGap);

        drawTextSelection(date, detailsLeftX, dateTextBottomY, otherCharWidth, otherCharHeight, otherCharGap);
        doc.line(detailsLeftX, dateUnderlineY, detailsLeftX + dateW, dateUnderlineY);

        doc.save(`Lab_Report_Cover_${studentName.replace(/\s+/g, '_')}.pdf`);
      };

        const clonedSvg = svgElement.cloneNode(true);
        const helpers = clonedSvg.querySelectorAll(".gui-helper, .grid-overlay");
        helpers.forEach(el => el.remove());
        const svgString = new XMLSerializer().serializeToString(clonedSvg);
        const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Lab_Report_Cover_${studentName.replace(/\s+/g, '_')}.svg`;

        link.click();
        document.body.removeChild(link);

                <div className="flex items-center justify-between">
                  <span>Title Lettering (10x8x1mm):</span>
                  <span className={compliance.titleChar ? 'text-emerald-400' : 'text-amber-400'}>{compliance.titleChar ? '✓ Lock 100%' : 'Modified'}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span>Name Lettering (5x4x1mm):</span>
                  <span className={compliance.nameChar ? 'text-emerald-400' : 'text-amber-400'}>{compliance.nameChar ? '✓ Lock 100%' : 'Modified'}</span>
                </div>
              </div>
            </div>

            <div className="space-y-2 mt-auto">
              <button onClick={handleDownloadPDF} className="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-2.5 px-4 rounded text-xs flex items-center justify-center space-x-2 transition-all shadow-lg shadow-cyan-500/10">
                <span>Download Vector PDF</span>
              </button>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={handleDownloadSVG} className="bg-slate-900 hover:bg-slate-800 text-slate-300 font-semibold py-2 px-3 rounded text-xs border border-slate-800 hover:border-slate-700 flex items-center justify-center space-x-1.5 transition-all">
                  <span>Export SVG</span>
                </button>
                <button onClick={() => window.print()} className="bg-slate-900 hover:bg-slate-800 text-slate-300 font-semibold py-2 px-3 rounded text-xs border border-slate-800 hover:border-slate-700 flex items-center justify-center space-x-1.5 transition-all">
                  <span>Print Cover</span>
                </button>
              </div>
            </div>
          </div>

          {/* --- RIGHT CAD CANVAS VIEWER PANEL --- */}
          <div className="flex-grow bg-slate-900 p-8 flex flex-col items-center justify-center overflow-auto select-none relative print-page">
            <div className="no-print absolute top-4 right-4 bg-slate-950/80 backdrop-blur-md px-3 py-1.5 rounded-lg border border-slate-800 flex items-center space-x-3 text-xs z-20">
              <div className="text-slate-400 font-mono">Zoom Preview:</div>
              <div className="flex items-center space-x-2">
                <button onClick={() => setZoom(Math.max(0.4, zoom - 0.05))} className="text-slate-400 hover:text-white px-1 font-bold">-</button>
                <span className="text-white font-mono min-w-[40px] text-center">{Math.round(zoom * 100)}%</span>
                <button onClick={() => setZoom(Math.min(1.5, zoom + 0.05))} className="text-slate-400 hover:text-white px-1 font-bold">+</button>
              </div>
              <button onClick={() => setZoom(0.8)} className="text-cyan-400 hover:underline pl-2 border-l border-slate-800">Reset</button>
            </div>

            <div style={{ transform: `scale(${zoom})`, transformOrigin: 'center center' }} className="transition-transform duration-100 flex flex-col items-center justify-center print-container">
              <div className="relative flex" style={{ paddingLeft: showRulers ? '25px' : '0px', paddingTop: showRulers ? '25px' : '0px' }}>
                {showRulers && (
                  <svg className="no-print absolute top-0 left-[25px] bg-slate-950 border-b border-slate-800 text-[8px] text-slate-500 font-mono ruler-el" width="210mm" height="25px" viewBox="0 0 210 25">
                    <g fill="none" stroke="#475569" strokeWidth="0.15">
                      {Array.from({ length: 211 }).map((_, i) => {
                        let h = 3; let showLabel = false;
                        if (i % 10 === 0) { h = 8; showLabel = true; } else if (i % 5 === 0) { h = 5; }
                        return (
                          <g key={i}>
                            <line x1={i} y1={25 - h} x2={i} y2="25" />
                            {showLabel && <text x={i} y="10" textAnchor="middle" fill="#94a3b8" stroke="none">{i}</text>}
                          </g>
                        );
                      })}
                    </g>
                  </svg>
                )}

                {showRulers && (
                  <svg className="no-print absolute top-[25px] left-0 bg-slate-950 border-r border-slate-800 text-[8px] text-slate-500 font-mono ruler-el" width="25px" height="297mm" viewBox="0 0 25 297">
                    <g fill="none" stroke="#475569" strokeWidth="0.15">
                      {Array.from({ length: 298 }).map((_, i) => {
                        let w = 3; let showLabel = false;
                        if (i % 10 === 0) { w = 8; showLabel = true; } else if (i % 5 === 0) { w = 5; }
                        return (
                          <g key={i}>
                            <line x1={25 - w} y1={i} x2="25" y2={i} />
                            {showLabel && <text x="10" y={i + 3} textAnchor="middle" fill="#94a3b8" stroke="none">{i}</text>}
                          </g>
                        );
                      })}
                    </g>
                  </svg>
                )}

                <div className="relative bg-white shadow-2xl overflow-hidden" style={{ width: '210mm', height: '297mm' }}>
                  <svg id="cad-blueprint-sheet" width="210mm" height="297mm" viewBox="0 0 210 297" className="absolute top-0 left-0" style={{ width: '100%', height: '100%' }}>
                    <defs>
                      <pattern id="grid-1mm" width="1" height="1" patternUnits="userSpaceOnUse">
                        <path d="M 1 0 L 0 0 0 1" fill="none" stroke="#f1f5f9" strokeWidth="0.08"/>
                      </pattern>
                      <pattern id="grid-10mm" width="10" height="10" patternUnits="userSpaceOnUse">
                        <rect width="10" height="10" fill="url(#grid-1mm)"/>
                        <path d="M 10 0 L 0 0 0 10" fill="none" stroke="#e2e8f0" strokeWidth="0.2"/>
                      </pattern>
                      <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#ef4444" /></marker>
                      <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#3b82f6" /></marker>
                      <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#10b981" /></marker>
                      <marker id="arrow-yellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#eab308" /></marker>
                    </defs>

                    {showGrid && <rect className="no-print grid-overlay" width="210" height="297" fill="url(#grid-10mm)" />}

                    {showBorderLine && (
                      <rect x={boundLeft} y={boundTop} width={boundRight - boundLeft} height={boundBottom - boundTop} fill="none" stroke="black" strokeWidth="0.45" />
                    )}

                    {showGuidelines && (
                      <g className="no-print gui-helper opacity-90">
                        <rect x={boundLeft} y={boundTop} width={boundRight - boundLeft} height={boundBottom - boundTop} fill="none" stroke="#38bdf8" strokeWidth="0.25" strokeDasharray="1,2" />
                        <line x1={centerOfBounds} y1={boundTop} x2={centerOfBounds} y2={boundBottom} stroke="#f43f5e" strokeWidth="0.2" strokeDasharray="1,3" />

                        {renderHDim(0, boundLeft, 22, `${leftMargin}mm Left Margin`, false, "#3b82f6")}
                        {renderHDim(boundRight, 210, 22, `${rightMargin}mm Right Margin`, false, "#3b82f6")}
                        {renderVDim(10, 0, boundTop, `${topMargin}mm Top`, true, "#3b82f6")}
                        {renderVDim(10, boundBottom, 297, `${bottomMargin}mm Bottom`, true, "#3b82f6")}

                        {(() => {
                          const firstLine = title.split('\n')[0] || '';
                          const fW = calculateTextWidth(firstLine, titleCharWidth, titleCharGap);
                          const fX = centerOfBounds - fW / 2;
                          const fBottomY = currentTitleTopY + titleCharHeight;
                          return (
                            <g key="title-dimensions-group">
                              {renderVDim(fX - 4, currentTitleTopY, fBottomY, `${titleCharHeight}mm H`, false, "#ef4444", activeField === 'title')}
                              {renderHDim(fX, fX + titleCharWidth, currentTitleTopY - 4, `${titleCharWidth}mm W`, false, "#ef4444", activeField === 'title')}
                              {renderHDim(fX + titleCharWidth, fX + titleCharWidth + titleCharGap, currentTitleTopY - 4, `${titleCharGap}mm Gap`, true, "#ef4444", activeField === 'title')}
                              {renderVDim(fX + fW + 4, fBottomY, fBottomY + 1, "1mm Gap", true, "#ef4444", activeField === 'title')}
                            </g>
                          );
                        })()}

                        {(() => {
                          return (
                            <g key="name-dimensions-group">
                              {renderVDim(nameX - 4, nameTextTopY, nameTextBottomY, `${nameCharHeight}mm H`, false, "#10b981", activeField === 'name')}
                              {renderHDim(nameX, nameX + nameCharWidth, nameTextTopY - 4, `${nameCharWidth}mm W`, false, "#10b981", activeField === 'name')}
                              {renderHDim(nameX + nameCharWidth, nameX + nameCharWidth + nameCharGap, nameTextTopY - 4, `${nameCharGap}mm Gap`, true, "#10b981", activeField === 'name')}
                              {renderVDim(nameX + nameW + 2, nameTextBottomY, nameUnderlineY, "1mm Underline Gap", true, "#10b981", activeField === 'name')}
                              {renderHDim(alignedRightTarget, boundRight, nameUnderlineY, `${rightMarginGap}mm Margin Offset`, true, "#10b981", activeField === 'name')}
                            </g>
                          );
                        })()}

                        {(() => {
                          const showBlock = ['registerNo', 'groupNo', 'semesterNo', 'date'].includes(activeField);
                          return (
                            <g key="cascading-dimensions-group">
                              {renderVDim(detailsLeftX - 4, registerTextTopY, registerTextBottomY, `${otherCharHeight}mm H`, false, "#eab308", showBlock)}
                              {renderHDim(detailsLeftX, detailsLeftX + otherCharWidth, registerTextTopY - 4, `${otherCharWidth}mm W`, false, "#eab308", showBlock)}
                              {renderHDim(detailsLeftX + otherCharWidth, detailsLeftX + otherCharWidth + otherCharGap, registerTextTopY - 4, `${otherCharGap}mm Gap`, true, "#eab308", showBlock)}
                              {renderVDim(detailsLeftX + regW + 2, registerTextBottomY, registerUnderlineY, "1mm Underline Gap", true, "#eab308", showBlock)}
                              {renderVDim(detailsLeftX - 10, nameUnderlineY, registerTextTopY, `${verticalGap}mm Vertical Gap`, false, "#eab308", showBlock)}
                              {renderVDim(detailsLeftX - 10, registerUnderlineY, groupTextTopY, `${verticalGap}mm Vertical Gap`, false, "#eab308", showBlock)}
                              {renderVDim(detailsLeftX - 10, groupUnderlineY, semesterTextTopY, `${verticalGap}mm Vertical Gap`, false, "#eab308", showBlock)}
                              {renderVDim(detailsLeftX - 10, semesterUnderlineY, dateTextTopY, `${verticalGap}mm Vertical Gap`, false, "#eab308", showBlock)}
                              {renderVDim(detailsLeftX - 10, dateUnderlineY, boundBottom, `${dateBottomGap}mm Bottom Gap`, false, "#eab308", showBlock)}
                            </g>
                          );
                        })()}
                      </g>
                    )}

                    {title.split('\n').map((line, index) => {
                      const tWidth = calculateTextWidth(line, titleCharWidth, titleCharGap);
                      const tX = centerOfBounds - tWidth / 2;
                      const tBottomY = currentTitleTopY + index * (titleCharHeight + titleLineGap) + titleCharHeight;
                      const ulY = tBottomY + 1;
                      return (
                        <g key={index}>
                          {renderLineText(line, tX, tBottomY, titleCharWidth, titleCharHeight, titleCharGap)}
                          <line x1={tX} y1={ulY} x2={tX + tWidth} y2={ulY} stroke="black" strokeWidth="0.4" />
                        </g>
                      );
                    })}

                    {(() => {
                      return (
                        <g>
                          {renderLineText(studentName, nameX, nameTextBottomY, nameCharWidth, nameCharHeight, nameCharGap)}
                          <line x1={nameX} y1={nameUnderlineY} x2={nameX + nameW} y2={nameUnderlineY} stroke="black" strokeWidth="0.4" />
                        </g>
                      );
                    })()}

                    {(() => {
                      return (
                        <g>
                          {renderLineText(registerNo, detailsLeftX, registerTextBottomY, otherCharWidth, otherCharHeight, otherCharGap)}
                          <line x1={detailsLeftX} y1={registerUnderlineY} x2={detailsLeftX + regW} y2={registerUnderlineY} stroke="black" strokeWidth="0.4" />
                        </g>
                      );
                    })()}

                    {(() => {
                      return (
                        <g>
                          {renderLineText(groupNo, detailsLeftX, groupTextBottomY, otherCharWidth, otherCharHeight, otherCharGap)}
                          <line x1={detailsLeftX} y1={groupUnderlineY} x2={detailsLeftX + grpW} y2={groupUnderlineY} stroke="black" strokeWidth="0.4" />
                        </g>
                      );
                    })()}

                    {(() => {
                      return (
                        <g>
                          {renderLineText(semesterNo, detailsLeftX, semesterTextBottomY, otherCharWidth, otherCharHeight, otherCharGap)}
                          <line x1={detailsLeftX} y1={semesterUnderlineY} x2={detailsLeftX + semW} y2={semesterUnderlineY} stroke="black" strokeWidth="0.4" />
                        </g>
                      );
                    })()}

                    {(() => {
                      return (
                        <g>
                          {renderLineText(date, detailsLeftX, dateTextBottomY, otherCharWidth, otherCharHeight, otherCharGap)}
                          <line x1={detailsLeftX} y1={dateUnderlineY} x2={detailsLeftX + dateW} y2={dateUnderlineY} stroke="black" strokeWidth="0.4" />
                        </g>
                      );
                    })()}
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
